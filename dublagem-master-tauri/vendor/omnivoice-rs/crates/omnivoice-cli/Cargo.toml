[package]
name = "omnivoice-cli"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
default-run = "omnivoice-cli"

[dependencies]
omnivoice-infer = { path = "../omnivoice-infer" }
serde_json.workspace = true
candle-core.workspace = true
hf-hub.workspace = true

[features]
default = []
cuda = ["omnivoice-infer/cuda"]
metal = ["omnivoice-infer/metal"]

[[bin]]
name = "omnivoice-infer"
path = "src/bin/omnivoice-infer.rs"

[[bin]]
name = "omnivoice-infer-batch"
path = "src/bin/omnivoice-infer-batch.rs"
